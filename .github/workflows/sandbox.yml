name: Sandbox

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Unique sandbox request ID
        required: true
        type: string
      pinggy_token:
        description: Optional Pinggy token for authenticated tunnels
        required: false
        default: ""
        type: string
      startup_timeout_seconds:
        description: Timeout for publishing metadata
        required: false
        default: "120"
        type: string

run-name: sandbox-${{ inputs.request_id }}

permissions:
  actions: read
  contents: read

jobs:
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install sshdev
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          git clone --depth=1 https://github.com/117503445/sshdev "$tmpdir/sshdev"
          cd "$tmpdir/sshdev"
          CGO_ENABLED=0 go build -o sshdev ./cmd/sshdev
          sudo install -m 0755 sshdev /usr/local/bin/sshdev
          sshdev run --help | sed -n '1,20p'

      - name: Build sandbox host
        run: |
          set -euo pipefail
          mkdir -p ./bin
          go build -o ./bin/sandbox-host ./cmd/sandbox-host

      - name: Start sandbox host
        env:
          REQUEST_ID: ${{ inputs.request_id }}
          PINGGY_TOKEN: ${{ inputs.pinggy_token }}
          STARTUP_TIMEOUT_SECONDS: ${{ inputs.startup_timeout_seconds }}
          METADATA_PATH: ${{ runner.temp }}/sandbox-metadata.json
          LOG_PATH: ${{ runner.temp }}/sandbox-host.log
          PID_PATH: ${{ runner.temp }}/sandbox-host.pid
          WORKDIR: ${{ github.workspace }}
        run: |
          set -euo pipefail
          rm -f "$METADATA_PATH" "$LOG_PATH" "$PID_PATH"
          HELPER_PATH="$WORKDIR/bin/sandbox-host"
          nohup sudo env PATH="$PATH" HOME=/root WORKDIR="$WORKDIR" \
            bash -lc 'cd "$WORKDIR" && exec "$0" \
              --request-id "$1" \
              --pinggy-token "$2" \
              --metadata-path "$3" \
              --startup-timeout "$4"' \
            "$HELPER_PATH" \
            "$REQUEST_ID" \
            "$PINGGY_TOKEN" \
            "$METADATA_PATH" \
            "${STARTUP_TIMEOUT_SECONDS}s" \
            >"$LOG_PATH" 2>&1 &
          echo $! > "$PID_PATH"

      - name: Wait for metadata
        env:
          METADATA_PATH: ${{ runner.temp }}/sandbox-metadata.json
          STARTUP_TIMEOUT_SECONDS: ${{ inputs.startup_timeout_seconds }}
          LOG_PATH: ${{ runner.temp }}/sandbox-host.log
        run: |
          set -euo pipefail
          for _ in $(seq 1 "$STARTUP_TIMEOUT_SECONDS"); do
            if [ -s "$METADATA_PATH" ]; then
              cat "$METADATA_PATH"
              exit 0
            fi
            sleep 1
          done
          echo "metadata file was not created in time" >&2
          if [ -f "$LOG_PATH" ]; then
            cat "$LOG_PATH" >&2
          fi
          exit 1

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-${{ inputs.request_id }}
          path: ${{ runner.temp }}/sandbox-metadata.json
          retention-days: 1
          if-no-files-found: error

      - name: Wait for sandbox shutdown
        env:
          PID_PATH: ${{ runner.temp }}/sandbox-host.pid
        run: |
          set -euo pipefail
          pid="$(cat "$PID_PATH")"
          while kill -0 "$pid" 2>/dev/null; do
            sleep 5
          done

      - name: Show sandbox host log
        if: always()
        env:
          LOG_PATH: ${{ runner.temp }}/sandbox-host.log
        run: |
          if [ -f "$LOG_PATH" ]; then
            cat "$LOG_PATH"
          fi
